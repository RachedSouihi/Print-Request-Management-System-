version: '3.7'
services:





  flink-jobmanager:
    image: custom-flink-img:latest
    ports:
      - "8081:8081"
      - "6123:6123"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    networks:
      - prms-network  # Use the common network
    volumes:
      - ./flink-scripts:/opt/flink/user-code
      - ./src:/opt/flink/src   # Mount the src directory (excluding .csv files)

  flink-taskmanager:
    image: custom-flink-img:latest
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    ports:
      - "6121:6121"
      - "6122:6122"
      - "6124:6124"
    networks:
      - prms-network  # Use the common network
    volumes:
      - ./flink-scripts:/opt/flink/user-code
      - ./src:/opt/flink/src   # Mount the src directory (excluding .csv files)

  redis:
    image: redis:latest
    ports:
      - "6379:6379"  # Expose Redis port on the host (optional, but useful for debugging)
    networks:
      - prms-network  # Add Redis to the common network

  fastapi:
    image: fastapi-app:latest  # Replace with the name of your FastAPI Docker image
    build:
      context: ./app  # Path to the directory containing the FastAPI Dockerfile
    ports:
      - "8000:8000"  # Map FastAPI's port to the host
    depends_on:
      - redis  # Ensure Redis is started before FastAPI
    networks:
      - prms-network  # Add FastAPI to the common network


  postgres: 
    image: postgres:14  # Use your preferred PostgreSQL version
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "242619"
      POSTGRES_DB: prms
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistent storage
    ports:
      - "5432:5432"  # Expose on host (optional)
    networks:
      - prms-network
    restart: always

networks:
  prms-network:
    driver: bridge
    name: prms-network

volumes:
  postgres_data:  # Define the volume for PostgreSQL
    driver: local